spring:
  datasource:
    url: jdbc:mysql://localhost:3306/roommate
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update      # automatically create tables
    show-sql: true          # prints SQL to console
    properties:
      hibernate:
        format_sql: true    # makes SQL readable

server:
  port: 8080               # default Spring Boot port

  spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/roommate}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}

