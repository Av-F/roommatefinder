spring.application.name=roommatefinder

# Server
server.port=8080

# Datasource (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (set via environment variables in production)
jwt.secret=${JWT_SECRET:supersecretkeysupersecretkey123456}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.issuer=roommatefinder
